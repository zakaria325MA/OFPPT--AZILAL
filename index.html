<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISTA AZILAL | Plateforme de Gestion</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <!-- Background Animation -->
    <div class="bg-animation">
        <div class="hero-bg-img" style="position: absolute; width: 100%; height: 100%; background-image: url('ista_classroom_real_1777140861702.png'); background-size: cover; background-position: center; opacity: 0.4; filter: brightness(0.6) contrast(1.2); z-index: 0;"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
    </div>

    <!-- Auth Section -->
    <section id="auth-section">
        <div style="position: absolute; top: 2rem; right: 2rem; display: flex; gap: 1rem; align-items: center; z-index: 3000;">
            <select id="lang-selector" onchange="changeLang(this.value)" class="glass lang-select">
                <option value="fr">🇫🇷 FR</option>
                <option value="en">🇺🇸 EN</option>
                <option value="ar">🇲🇦 AR</option>
            </select>
            <button class="btn glass theme-toggle-btn" onclick="toggleTheme()">
                <i class="fas fa-moon" id="theme-icon"></i>
            </button>
        </div>
        <div class="auth-container fade-in" style="display: flex; align-items: center; justify-content: center; gap: 4rem; width: 100%; max-width: 1100px;">
            <div class="glass-card auth-card" style="flex: 1; max-width: 450px;">
                <h1 class="logo-text">ISTA AZILAL</h1>
                <p style="color: var(--text-muted); margin-top: 0.5rem;"></p>
                
                <div class="role-selector">
                    <div class="role-btn glass" onclick="selectRole('teacher')">
                        <i class="fas fa-chalkboard-teacher"></i>
                        <span>Formateur</span>
                    </div>
                    <div class="role-btn glass" onclick="selectRole('student')">
                        <i class="fas fa-user-graduate"></i>
                        <span>Stagiaire</span>
                    </div>
                </div>

                <div id="login-form" style="display: none;">
                    <input type="text" id="username" placeholder="Smiya dialek" autocomplete="off">
                    <input type="password" id="usercode" placeholder="Code Massar / Mot de passe" autocomplete="off">
                    <button class="btn btn-primary" style="width: 100%; justify-content: center;" onclick="login()">
                        Dkhol l-Dashboard <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            </div>

            <div class="auth-illustration" style="flex: 1; display: flex; justify-content: center; align-items: center;">
                <img src="ista_3d_pro.png" alt="Education" style="width: 100%; max-width: 500px; filter: drop-shadow(0 20px 40px rgba(0,0,0,0.3)); animation: float 6s infinite ease-in-out;">
            </div>
        </div>
    </section>

    <!-- Main Dashboard Section -->
    <main id="main-app">
        <header class="glass">
            <div class="logo-text" style="font-size: 1.5rem;">ISTA AZILAL</div>
            <div id="user-info" style="display: flex; align-items: center; gap: 1rem;">
                <div class="profile-container" onclick="triggerProfileUpload()">
                    <img id="profile-img" src="https://ui-avatars.com/api/?name=User&background=6366f1&color=fff" alt="Profile">
                    <input type="file" id="profile-upload" style="display: none;" accept="image/*" onchange="handleProfileUpload(this)">
                </div>
                <div style="display: flex; flex-direction: column; line-height: 1.2; margin-right: 0.5rem;">
                    <span id="display-name" style="font-weight: 600; font-size: 1rem;"></span>
                    <span id="display-role" style="font-size: 0.75rem; color: var(--text-muted); opacity: 0.8;"></span>
                </div>
                <button id="btn-change-pwd" class="btn" style="background: rgba(99, 102, 241, 0.2); color: var(--primary); padding: 0.5rem 1rem; display: none;" onclick="showChangePwdModal()" title="Changer Mot de passe">
                    <i class="fas fa-key"></i>
                </button>
                <button class="btn" style="background: rgba(239, 68, 68, 0.2); color: var(--danger); padding: 0.5rem 1rem;" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </header>

        <div class="container">
            <!-- Navigation for Teacher -->
            <nav id="teacher-nav" class="nav-tabs" style="display: none;">
                <div class="nav-tab active" onclick="switchTab('students')"><i class="fas fa-users"></i> <span class="tab-label">Stagiaires</span></div>
                <div class="nav-tab" onclick="switchTab('grades')"><i class="fas fa-chart-bar"></i> <span class="tab-label">Notes</span></div>
                <div class="nav-tab" onclick="switchTab('exams')"><i class="fas fa-file-alt"></i> <span class="tab-label">Examens</span></div>
                <div class="nav-tab" onclick="switchTab('attendance')"><i class="fas fa-clipboard-check"></i> <span class="tab-label">Présence</span></div>
                <div class="nav-tab" onclick="switchTab('analytics')"><i class="fas fa-chart-pie"></i> <span class="tab-label">Statistiques</span></div>
            </nav>

            <!-- Navigation for Student -->
            <nav id="student-nav" class="nav-tabs" style="display: none;">
                <div class="nav-tab active" onclick="switchTab('my-grades')">Mes Notes</div>
                <div class="nav-tab" onclick="switchTab('take-exam')">Passer Examen</div>
            </nav>

            <!-- Content Areas -->
            <div id="content-area" class="fade-in">
                <!-- Dynamic content will be injected here -->
            </div>
        </div>
    </main>

    <!-- Custom Modal -->
    <div id="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 2000; align-items: center; justify-content: center;">
        <div class="glass-card" style="width: 100%; max-width: 400px; padding: 2.5rem;">
            <h2 id="modal-title" style="margin-bottom: 1.5rem;">Ajouter</h2>
            <div id="modal-content">
                <!-- Injected via JS -->
            </div>
            <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                <button class="btn btn-primary" id="modal-submit" style="flex: 1; justify-content: center;">OK</button>
                <button class="btn" onclick="closeModal()" style="flex: 1; justify-content: center; background: rgba(255,255,255,0.05);">Annuler</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
